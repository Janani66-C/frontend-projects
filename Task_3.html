<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Webpage</title>

<style>
    body{
        margin:0;
        font-family:Arial;
    }

    header{
        background:blue;
        color:white;
        padding:15px;
        text-align:center;
    }

    .container{
        display:flex;
        height:70vh;
    }

    .sidebar{
        width:25%;
        background:#ddd;
        padding:20px;
    }

    .main{
        width:75%;
        background:#f4f4f4;
        padding:20px;
    }

    footer{
        background:black;
        color:white;
        text-align:center;
        padding:10px;
    }

    /* Responsive */
    @media (max-width:768px){
        .container{
            flex-direction:column;
        }

        .sidebar, .main{
            width:100%;
        }
    }
</style>

</head>

<body>

<header>
    <h1>My Responsive Page</h1>
</header>

<div class="container">

    <div class="sidebar">
        <h2>Sidebar</h2>
        <p>Menu items here</p>
    </div>

    <div class="main">
        <h2>Main Content</h2>
        <p>This is the main content area of the webpage.</p>
    </div>

</div>

<footer>
    <p>Footer Section</p>
</footer>

</body>
</html>

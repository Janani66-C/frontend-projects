<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .product-card{
            width: 300px;
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .product-card img{
            width: 50%;
            border-radius: 10px;
        }

        .product-name{
            font-size: 24px;
            margin: 10px 0;
        }

        .price{
            font-size: 20px;
            color: green;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover{
            background-color: green;
        }
        .product-image{
    width: 90%;
    border-radius: 5px;
    transition: transform 0.3s ease;
}

.product-image:hover{
    transform: scale(1.1);
}
    </style>
</head>
<body>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1668371679302-a8ec781e876e?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bGVoZW5nYXxlbnwwfHwwfHx8MA%3D%3D" alt="Product Image" class="product-image">

        <h2 class="product-name">Lehanga</h2>

        <p class="price">₹2999</p>

        <button class="btn">Add to Cart</button>
    </div>

</body>
</html>
